name: Publish to npm

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      package:
        description: 'Informational only — both packages always publish (fail-fast: false keeps them independent)'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [thekselect, thekselect-vue]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build thekselect (required for thekselect-vue type checking)
        if: matrix.package == 'thekselect-vue'
        run: npm run build --workspace=packages/thekselect

      - name: Verify release package
        run: npm run release:check
        working-directory: packages/${{ matrix.package }}

      - name: Publish to npm
        run: npm publish --provenance
        working-directory: packages/${{ matrix.package }}
