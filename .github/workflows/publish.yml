name: Publish to npm

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      package:
        description: 'Informational only — the workflow always publishes core first, then the Vue wrapper'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write

# npm trusted publishing is configured for this repo/workflow.
# Order matters: thekselect-vue publishes only after thekselect succeeds.

jobs:
  publish-core:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify thekselect release package
        run: npm run release:check
        working-directory: packages/thekselect

      - name: Publish thekselect to npm
        run: npm publish --provenance
        working-directory: packages/thekselect

  publish-vue:
    runs-on: ubuntu-latest
    needs: publish-core

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build thekselect (required for thekselect-vue type checking)
        run: npm run build --workspace=packages/thekselect

      - name: Verify thekselect-vue release package
        run: npm run release:check
        working-directory: packages/thekselect-vue

      - name: Publish thekselect-vue to npm
        run: npm publish --provenance
        working-directory: packages/thekselect-vue
